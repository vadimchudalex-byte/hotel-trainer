<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hotel English 🏨</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --cream:  #fdf6ec;
  --cream2: #f5e9d4;
  --cream3: #e8d9bc;
  --brown:  #6b4c2a;
  --brown2: #3e2510;
  --gold:   #c9922a;
  --gold-l: #e8b84a;
  --gold-d: #8a5f10;
  --text:   #2e1f0e;
  --text2:  #6b4c2a;
  --text3:  #a07840;
  --green:  #2d7a4a;
  --green-l:#e6f4ed;
  --red:    #b83535;
  --red-l:  #fce8e8;
  --blue:   #2450a0;
  --blue-l: #e8eef8;
  --blue-b: #1a3470;
  --shadow: rgba(107,76,42,0.13);
  --r: 15px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ═══ HOME ═══ */
.hero{background:linear-gradient(155deg,#3e2510 0%,#6b4c2a 55%,#8a6538 100%);padding:44px 20px 36px;text-align:center;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(255,255,255,0.025) 30px,rgba(255,255,255,0.025) 31px);pointer-events:none;}
.hero-stars{font-size:1rem;letter-spacing:8px;color:var(--gold-l);margin-bottom:14px;position:relative;z-index:1;}
.hero-icon{font-size:4rem;display:block;margin-bottom:10px;position:relative;z-index:1;filter:drop-shadow(0 4px 14px rgba(0,0,0,0.45));animation:float 3.5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;color:var(--cream);line-height:1;position:relative;z-index:1;}
.hero-title em{color:var(--gold-l);font-style:normal;}
.hero-sub{font-size:0.72rem;color:rgba(253,246,236,0.55);letter-spacing:3.5px;text-transform:uppercase;margin-top:9px;position:relative;z-index:1;}
.hero-key{font-size:1.3rem;margin-top:18px;opacity:0.5;position:relative;z-index:1;}
.sit-list{padding:18px 14px 44px;display:flex;flex-direction:column;gap:11px;max-width:540px;margin:0 auto;width:100%;}
.scard{background:#fff;border:1px solid var(--cream3);border-radius:var(--r);display:flex;align-items:stretch;cursor:pointer;overflow:hidden;box-shadow:0 2px 12px var(--shadow);transition:transform .15s,box-shadow .15s;}
.scard:hover,.scard:active{transform:translateY(-2px);box-shadow:0 6px 22px var(--shadow);}
.scard-bar{width:5px;flex-shrink:0;background:linear-gradient(180deg,var(--gold-l),var(--gold-d));}
.scard-body{flex:1;padding:13px 15px;display:flex;align-items:center;gap:13px;}
.scard-emoji{font-size:2rem;flex-shrink:0;}
.scard-info{flex:1;}
.scard-title{font-weight:900;font-size:0.93rem;}
.scard-sub{font-size:0.76rem;color:var(--text3);margin-top:2px;}
.scard-tag{font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.scard-arr{color:var(--cream3);font-size:1.6rem;padding:0 2px;}

/* ═══ SITUATION ═══ */
.topbar{background:var(--brown2);padding:12px 15px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:50;box-shadow:0 2px 14px rgba(0,0,0,0.3);}
.back-btn{background:none;border:1px solid rgba(232,184,74,.35);color:var(--gold-l);font-size:0.8rem;font-weight:800;padding:5px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:background .15s;}
.back-btn:hover{background:rgba(232,184,74,.1);}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:0.98rem;font-weight:700;color:var(--cream);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pdots{display:flex;gap:7px;flex-shrink:0;}
.pdot{width:11px;height:11px;border-radius:50%;border:2px solid var(--gold-d);background:transparent;transition:all .3s;}
.pdot.done{background:var(--green);border-color:var(--green);}
.pdot.active{background:var(--gold-l);border-color:var(--gold-l);transform:scale(1.3);}
.sit-scroll{flex:1;overflow-y:auto;padding:18px 14px 50px;max-width:570px;margin:0 auto;width:100%;}
.sit-hdr{background:linear-gradient(135deg,var(--brown2),#5a3c1e);border-radius:var(--r);padding:16px 16px 13px;margin-bottom:20px;display:flex;align-items:flex-start;gap:13px;box-shadow:0 4px 16px var(--shadow);}
.sit-hdr-em{font-size:2.3rem;flex-shrink:0;margin-top:2px;}
.sit-hdr-t{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--cream);}
.sit-hdr-d{font-size:0.78rem;color:rgba(253,246,236,.6);margin-top:4px;line-height:1.5;}

/* Dialog bubbles */
.dbbl{margin-bottom:16px;animation:slideUp .33s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:translateY(0)}}
.brole{font-size:0.68rem;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.brole.you{color:var(--blue);}
.brole.mgr{color:var(--gold);}
.bbody{border-radius:var(--r);padding:13px 15px;max-width:97%;}
.bbody.you{background:var(--blue-l);border:1.5px solid #b8cce8;margin-left:auto;}
.bbody.mgr{background:#fff;border:1.5px solid var(--cream3);box-shadow:0 2px 9px var(--shadow);}
.mgtxt{font-size:0.98rem;color:var(--text);line-height:2.1;}
.mw{position:relative;display:inline-block;cursor:default;border-bottom:1.5px dashed transparent;border-radius:3px;padding:0 2px;transition:border-color .15s,background .15s;}
.mw:hover{border-bottom-color:var(--gold);background:rgba(201,146,42,.09);}
.mw-tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--brown2);border:1px solid var(--gold-d);border-radius:10px;padding:7px 13px 8px;white-space:nowrap;z-index:999;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.32);text-align:center;min-width:85px;}
.mw:hover .mw-tip{display:block;}
.mw-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--brown2);}
.tt-t{display:block;font-size:0.7rem;color:var(--gold-l);font-style:italic;line-height:1.5;margin-bottom:2px;}
.tt-r{display:block;font-size:0.77rem;color:var(--cream);line-height:1.5;}

/* Listen button */
.reply-listen-row{margin-top:10px;}
.reply-listen-btn{background:none;border:1.5px solid var(--gold-d);color:var(--gold);padding:5px 14px;border-radius:20px;font-size:0.8rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .15s,color .15s;display:inline-flex;align-items:center;gap:5px;}
.reply-listen-btn:hover{background:rgba(201,146,42,.1);}
.reply-listen-btn.playing{background:var(--gold);color:#fff;border-color:var(--gold);}

/* Question block */
.qblock{background:#fff;border:1px solid var(--cream3);border-radius:var(--r);padding:16px 14px 14px;margin-bottom:18px;box-shadow:0 2px 10px var(--shadow);}
.q-pr{font-size:0.73rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:3px;}
.q-hi{font-size:0.84rem;color:var(--text2);margin-bottom:13px;font-style:italic;line-height:1.4;}
.wbank{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px;min-height:36px;}
.wchip{background:var(--cream2);border:1.5px solid var(--cream3);color:var(--text);padding:5px 12px;border-radius:9px;font-size:0.87rem;font-weight:700;cursor:pointer;transition:background .12s,opacity .25s,transform .15s;font-family:'Nunito',sans-serif;user-select:none;}
.wchip:hover:not(.used){background:var(--cream3);transform:translateY(-2px);}
.wchip.used{opacity:0;pointer-events:none;transform:scale(0.55);transition:opacity .22s,transform .22s;}
.aa{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;background:var(--cream);border:2px dashed var(--cream3);border-radius:10px;padding:8px 10px;margin-bottom:11px;align-items:center;transition:border-color .3s,background .3s;}
.aa.correct{border-style:solid;border-color:var(--green);background:var(--green-l);}
.aa.wrong{border-style:solid;border-color:var(--red);background:var(--red-l);animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.aa-ph{color:var(--text3);font-size:0.82rem;font-style:italic;}
.aw{background:var(--blue-l);border:1.5px solid #b0c4e8;color:var(--blue-b);padding:5px 12px;border-radius:8px;font-size:0.87rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;animation:pop .18s ease;transition:background .1s;}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.aw:hover{background:#d4e2f5;}
.qbtns{display:flex;gap:8px;flex-wrap:wrap;}
.qbtn{padding:8px 16px;border-radius:9px;font-size:0.82rem;font-weight:800;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity .15s,transform .1s;}
.qbtn:disabled{opacity:.3;cursor:not-allowed;}
.qbtn:not(:disabled):active{transform:scale(.95);}
.qbtn.rst{background:var(--cream2);border:1px solid var(--cream3);color:var(--text2);}
.qbtn.chk{background:var(--gold);color:#fff;}
.qbtn.spk{background:var(--green);color:#fff;}
.qfb{margin-top:9px;padding:7px 11px;border-radius:8px;font-size:0.82rem;font-weight:700;display:none;}
.qfb.good{display:block;background:var(--green-l);border:1px solid var(--green);color:var(--green);}
.qfb.bad{display:block;background:var(--red-l);border:1px solid var(--red);color:var(--red);}
.sst{font-size:0.77rem;color:var(--text3);margin-top:5px;min-height:15px;font-style:italic;}
.sst.ok{color:var(--green);}
.sst.err{color:var(--red);}
.sst.go{color:var(--gold);}

/* Complete card */
.done-card{background:linear-gradient(135deg,#fff9f0,#fff);border:2px solid var(--gold);border-radius:var(--r);padding:28px 20px;text-align:center;margin-top:8px;display:none;box-shadow:0 4px 20px var(--shadow);}
.done-card.show{display:block;animation:slideUp .4s ease;}
.done-card h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--gold);}
.done-card p{color:var(--text2);font-size:0.84rem;margin-top:6px;}
.done-stars{font-size:1.4rem;letter-spacing:6px;margin:10px 0;}
.home-btn{margin-top:15px;display:inline-block;background:var(--brown2);color:var(--cream);padding:10px 28px;border-radius:10px;font-weight:800;font-size:0.88rem;cursor:pointer;border:none;font-family:'Nunito',sans-serif;transition:opacity .15s;}
.home-btn:hover{opacity:.85;}

/* Mic button styles */
.mic-allow-btn{background:var(--gold);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-weight:800;font-size:0.85rem;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;transition:opacity .15s;}
.mic-allow-btn:hover{opacity:.88;}
.mic-dismiss-btn{background:none;border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.65);padding:7px 12px;border-radius:8px;font-size:0.8rem;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;}
.mic-dismiss-btn:hover{border-color:rgba(255,255,255,0.6);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--cream2);}
::-webkit-scrollbar-thumb{background:var(--cream3);border-radius:3px;}

/* ═══ GLOBAL VOCAB WIDGET ═══ */
#vocab-widget{
  position:fixed;left:16px;top:120px;
  width:200px;
  background:#fff;
  border:1.5px solid var(--gold-d);
  border-radius:14px;
  box-shadow:0 4px 20px var(--shadow);
  z-index:8800;
  overflow:hidden;
  cursor:move;
  user-select:none;
}
#vocab-widget.collapsed #vocab-body{display:none;}
#vocab-head{
  background:var(--brown2);
  padding:9px 12px;
  display:flex;align-items:center;gap:8px;
  cursor:move;
}
#vocab-head span{font-size:0.8rem;font-weight:900;color:var(--gold-l);flex:1;letter-spacing:.5px;}
#vocab-toggle{background:none;border:none;color:var(--gold-l);cursor:pointer;font-size:1rem;padding:0 2px;line-height:1;}
#vocab-body{max-height:55vh;overflow-y:auto;padding:8px 10px 10px;}
.vocab-item{
  padding:6px 4px;
  border-bottom:1px solid var(--cream3);
  position:relative;
  cursor:default;
}
.vocab-item:last-child{border-bottom:none;}
.vocab-en{font-size:0.83rem;font-weight:800;color:var(--text);}
.vocab-ru{font-size:0.78rem;color:var(--text2);margin-top:1px;}
.vocab-tip{
  display:none;
  position:absolute;
  left:105%;top:0;
  background:var(--brown2);
  border:1px solid var(--gold-d);
  border-radius:8px;
  padding:6px 10px;
  white-space:nowrap;
  z-index:9999;
  pointer-events:none;
  box-shadow:0 4px 14px rgba(0,0,0,.3);
}
.vocab-item:hover .vocab-tip{display:block;}
.vocab-tip span{display:block;font-size:0.75rem;color:var(--gold-l);font-style:italic;}

/* ═══ STICKY NOTES ═══ */
#notes-fab{position:fixed;bottom:22px;right:22px;width:52px;height:52px;border-radius:50%;background:#2e1f0e;border:2px solid #c9922a;color:#e8b84a;font-size:1.4rem;cursor:pointer;z-index:9000;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,0.35);transition:transform .15s,background .15s;user-select:none;}
#notes-fab:hover{transform:scale(1.1);background:#4a3018;}
#notes-panel{position:fixed;bottom:86px;right:22px;width:270px;background:#fffbe8;border:1.5px solid #c9922a;border-radius:14px;padding:14px;box-shadow:0 8px 28px rgba(0,0,0,0.28);z-index:9001;display:none;flex-direction:column;gap:9px;}
#notes-panel.open{display:flex;animation:panelIn .2s ease;}
@keyframes panelIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#notes-panel textarea{width:100%;min-height:80px;resize:vertical;border:1.5px solid #e8d9bc;border-radius:9px;padding:9px 10px;font-family:'Nunito',sans-serif;font-size:0.88rem;color:#2e1f0e;background:#fff;outline:none;transition:border-color .15s;}
#notes-panel textarea:focus{border-color:#c9922a;}
.notes-colors{display:flex;gap:7px;align-items:center;}
.notes-colors span{font-size:0.72rem;color:#a07840;font-weight:700;}
.nc-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0;}
.nc-dot:hover{transform:scale(1.15);}
.nc-dot.sel{border-color:#2e1f0e;transform:scale(1.2);}
.notes-actions{display:flex;gap:8px;}
.na-btn{flex:1;padding:8px 0;border-radius:9px;border:none;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:opacity .15s,transform .1s;}
.na-btn:active{transform:scale(.96);}
.na-add{background:#c9922a;color:#fff;}
.na-add:hover{opacity:.88;}
.na-clr{background:#f0e0c8;color:#6b4c2a;}
.na-clr:hover{opacity:.8;}
.notes-hint{font-size:0.7rem;color:#b09060;text-align:center;}
.sticky{position:fixed;min-width:160px;max-width:280px;padding:10px 12px;border-radius:10px;box-shadow:3px 4px 16px rgba(0,0,0,0.22);z-index:8900;cursor:move;user-select:none;font-family:'Nunito',sans-serif;font-size:0.88rem;color:#2e1f0e;line-height:1.5;word-break:break-word;animation:stickyIn .2s ease;}
@keyframes stickyIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.sticky-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:6px;}
.sticky-drag-hint{font-size:0.65rem;opacity:.5;cursor:move;}
.sticky-del{background:rgba(0,0,0,0.12);border:none;border-radius:50%;width:20px;height:20px;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#2e1f0e;flex-shrink:0;transition:background .12s;}
.sticky-del:hover{background:rgba(0,0,0,0.25);}
.sticky-body{outline:none;min-height:20px;white-space:pre-wrap;cursor:text;}
.sticky-body:focus{outline:1.5px dashed rgba(0,0,0,0.2);border-radius:4px;}
.sticky-edit-hint{font-size:0.65rem;opacity:.45;margin-top:4px;}
</style>
</head>
<body>

<!-- MIC BANNER -->
<div id="mic-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#2e1f0e;border-top:2px solid #c9922a;padding:14px 20px;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:0 -4px 20px rgba(0,0,0,0.4);">
  <span style="font-size:1.2rem;">🎙️</span>
  <div style="flex:1;min-width:160px;">
    <div style="color:#fdf6ec;font-weight:800;font-size:0.88rem;">Нужен доступ к микрофону</div>
    <div style="color:rgba(253,246,236,0.55);font-size:0.75rem;margin-top:2px;">Нажми «Разрешить» для распознавания речи</div>
  </div>
  <button class="mic-allow-btn" onclick="micBannerAllow()">🎤 Разрешить</button>
  <button class="mic-dismiss-btn" onclick="document.getElementById('mic-banner').style.display='none'">✕</button>
</div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="hero">
    <div class="hero-stars">★ ★ ★ ★ ★</div>
    <span class="hero-icon">🏨</span>
    <h1 class="hero-title">Hotel <em>English</em></h1>
    <p class="hero-sub">Разговорные ситуации</p>
    <div class="hero-key">🗝️</div>
  </div>
  <div class="sit-list" id="sit-list"></div>
</div>

<!-- SITUATION -->
<div class="screen" id="screen-sit">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← Назад</button>
    <div class="tb-title" id="tb-title">Ситуация</div>
    <div class="pdots" id="pdots"></div>
  </div>
  <div class="sit-scroll" id="sit-scroll"></div>
</div>

<!-- GLOBAL VOCAB WIDGET -->
<div id="vocab-widget">
  <div id="vocab-head">
    <span>📖 Словарик</span>
    <button id="vocab-toggle" onclick="toggleVocab()" title="Свернуть/развернуть">▾</button>
  </div>
  <div id="vocab-body"></div>
</div>

<!-- NOTES FAB -->
<button id="notes-fab" title="Заметки (N)" onclick="toggleNotesPanel()">📝</button>
<div id="notes-panel">
  <textarea id="notes-input" placeholder="Напиши заметку…" onkeydown="noteKeydown(event)"></textarea>
  <div class="notes-colors">
    <span>Цвет:</span>
    <div class="nc-dot sel" style="background:#fff9a0" data-c="#fff9a0" onclick="selColor(this)"></div>
    <div class="nc-dot" style="background:#c8f0c0" data-c="#c8f0c0" onclick="selColor(this)"></div>
    <div class="nc-dot" style="background:#b8d8f8" data-c="#b8d8f8" onclick="selColor(this)"></div>
    <div class="nc-dot" style="background:#f8c8d8" data-c="#f8c8d8" onclick="selColor(this)"></div>
    <div class="nc-dot" style="background:#ffe0b0" data-c="#ffe0b0" onclick="selColor(this)"></div>
  </div>
  <div class="notes-actions">
    <button class="na-btn na-add" onclick="addNote()">+ Добавить</button>
    <button class="na-btn na-clr" onclick="clearSitNotes()">🗑 Ситуация</button>
  </div>
  <div class="notes-hint">N — открыть · Enter — добавить · Shift+Enter — перенос</div>
</div>

<script>
// ════════════════════════════════════════
//  VOCAB DATA
// ════════════════════════════════════════
const VOCAB = [
  {en:'reservation',ru:'бронь / заказ',tr:'рэзэр-вэ́йшн'},
  {en:'check in',ru:'заселиться',tr:'чэк ин'},
  {en:'check out',ru:'выселиться',tr:'чэк а́ут'},
  {en:'room key / key card',ru:'ключ от номера',tr:'рум ки / ки ка́рд'},
  {en:'front desk',ru:'стойка регистрации',tr:'франт дэск'},
  {en:'floor',ru:'этаж',tr:'фло́р'},

let curSit=null, stepIdx=0, qSt={}, rec=null, recActive=false;
// stickers per situation: sitId → [{id, color, text, x, y}]
let stickerStore={};
let curSitId=null;
let panelOpen=false;
let noteColor='#fff9a0';
let noteCount=0;

// ════════════════════════════════════════
//  HOME
// ════════════════════════════════════════
function buildHome(){
  const L=document.getElementById('sit-list'); L.innerHTML='';
  SITS.forEach((s,i)=>{
    const c=mk('div','scard'); c.onclick=()=>openSit(i);
    c.innerHTML=`<div class="scard-bar"></div>
      <div class="scard-body">
        <div class="scard-emoji">${s.emoji}</div>
        <div class="scard-info"><div class="scard-title">${s.title}</div><div class="scard-sub">${s.sub}</div></div>
        ${s.badge?`<span class="scard-tag">${s.badge}</span>`:''}
        <div class="scard-arr">›</div>
      </div>`;
    L.appendChild(c);
  });
}

function goHome(){
  stopRec();
  hideSitStickers();
  show('screen-home'); hide('screen-sit');
  curSit=null; curSitId=null;
}

// ════════════════════════════════════════
//  SITUATION
// ════════════════════════════════════════
function openSit(i){
  curSit=SITS[i]; stepIdx=0; qSt={};
  curSitId=curSit.id;
  show('screen-sit'); hide('screen-home');
  document.getElementById('tb-title').textContent=curSit.title+' — '+curSit.sub;
  renderSit();
  showSitStickers(curSitId);
}

function Qs(){return curSit.steps.filter(s=>s.type==='q');}

function renderSit(){
  const scr=document.getElementById('sit-scroll'); scr.innerHTML='';
  const h=mk('div','sit-hdr');
  h.innerHTML=`<div class="sit-hdr-em">${curSit.emoji}</div><div><div class="sit-hdr-t">${curSit.title} — ${curSit.sub}</div><div class="sit-hdr-d">${curSit.desc}</div></div>`;
  scr.appendChild(h);
  const dots=document.getElementById('pdots'); dots.innerHTML='';
  Qs().forEach((_,i)=>{const d=mk('div','pdot');d.id=`pd${i}`;dots.appendChild(d);});
  renderUpTo(scr);
  setTimeout(()=>scr.scrollTop=scr.scrollHeight,80);
}

function renderUpTo(scr){
  while(scr.children.length>1) scr.removeChild(scr.lastChild);
  let qi=0;
  curSit.steps.forEach(step=>{
    if(step.type==='q'){
      if(qi<=stepIdx) renderQ(scr,step,qi);
      qi++;
    } else {
      if(qi>0 && qSt[qi-1]?.done) renderReply(scr,step);
    }
  });
  updDots();
}

function updDots(){
  Qs().forEach((_,i)=>{
    const d=document.getElementById(`pd${i}`); if(!d)return;
    d.className='pdot'+(qSt[i]?.done?' done':(i===stepIdx?' active':''));
  });
}

function renderQ(scr,step,qi){
  if(!qSt[qi]) qSt[qi]={words:[],done:false,spoke:false};
  const st=qSt[qi];
  const blk=mk('div','qblock'); blk.id=`qb${qi}`;
  blk.innerHTML=`
    <div class="q-pr">📝 ${step.pr}</div>
    <div class="q-hi">${step.hi}</div>
    <div class="wbank" id="wb${qi}"></div>
    <div class="aa" id="aa${qi}"><span class="aa-ph" id="aph${qi}">Нажимай слова выше, чтобы составить фразу…</span></div>
    <div class="qbtns">
      <button class="qbtn rst" onclick="resetQ(${qi})">↺ Сброс</button>
      <button class="qbtn chk" id="ck${qi}" onclick="checkQ(${qi})" disabled>✓ Проверить</button>
      <button class="qbtn spk" id="sp${qi}" onclick="doSpeak(${qi})" disabled>🎤 Говорю!</button>
    </div>
    <div class="qfb" id="fb${qi}"></div>
    <div class="sst" id="ss${qi}"></div>`;
  scr.appendChild(blk);
  const bank=document.getElementById(`wb${qi}`);
  [...step.words].sort(()=>Math.random()-.5).forEach(w=>{
    const c=mk('div','wchip'); c.textContent=w; c.dataset.w=w;
    c.onclick=()=>pickW(c,w,qi);
    bank.appendChild(c);
  });
  if(st.done) restoreDone(qi,step);
}

function pickW(chip,word,qi){
  if(chip.classList.contains('used')||qSt[qi].done)return;
  qSt[qi].words.push({word,chip}); chip.classList.add('used');
  const aa=document.getElementById(`aa${qi}`);
  document.getElementById(`aph${qi}`)?.remove();
  const sp=mk('span','aw'); sp.textContent=word;
  sp.onclick=()=>removeW(sp,chip,qi);
  aa.appendChild(sp);
  document.getElementById(`ck${qi}`).disabled=qSt[qi].words.length<Qs()[qi].words.length;
}

function removeW(span,chip,qi){
  if(qSt[qi].done)return;
  const idx=qSt[qi].words.findIndex(w=>w.chip===chip);
  if(idx!==-1)qSt[qi].words.splice(idx,1);
  chip.classList.remove('used'); span.remove();
  const aa=document.getElementById(`aa${qi}`);
  if(!aa.querySelector('.aw')){
    const ph=mk('span','aa-ph'); ph.id=`aph${qi}`; ph.textContent='Нажимай слова выше, чтобы составить фразу…';
    aa.appendChild(ph);
  }
  document.getElementById(`ck${qi}`).disabled=true;
}

function resetQ(qi){
  const st=qSt[qi]; if(st.done)return;
  st.words.forEach(w=>w.chip.classList.remove('used')); st.words=[];
  const aa=document.getElementById(`aa${qi}`);
  aa.innerHTML=''; aa.classList.remove('correct','wrong');
  const ph=mk('span','aa-ph'); ph.id=`aph${qi}`; ph.textContent='Нажимай слова выше, чтобы составить фразу…';
  aa.appendChild(ph);
  document.getElementById(`ck${qi}`).disabled=true;
  document.getElementById(`sp${qi}`).disabled=true;
  setFb(qi,'',''); setSS(qi,'','');
}

function checkQ(qi){
  const st=qSt[qi]; const step=Qs()[qi];
  const user=st.words.map(w=>w.word).join(' ');
  const aa=document.getElementById(`aa${qi}`);
  if(user===step.ans){
    aa.classList.add('correct'); aa.classList.remove('wrong');
    setFb(qi,'✅ Верно! Теперь произнеси вслух!','good');
    document.getElementById(`sp${qi}`).disabled=false;
    document.getElementById(`ck${qi}`).disabled=true;
    st.done=true;
    tts(pick(['Good!','Correct!','Well done!','Yes!']),0.9);
    setTimeout(()=>advance(qi),350);
  } else {
    aa.classList.add('wrong');
    setTimeout(()=>aa.classList.remove('wrong'),500);
    setFb(qi,'❌ Не совсем верно. Попробуй ещё раз!','bad');
  }
}

function advance(qi){
  const total=Qs().length;
  stepIdx=Math.min(qi+1,total-1);
  const scr=document.getElementById('sit-scroll');
  renderUpTo(scr);
  setTimeout(()=>scr.scrollTop=scr.scrollHeight,100);
}

function restoreDone(qi,step){
  const aa=document.getElementById(`aa${qi}`); aa.innerHTML=''; aa.classList.add('correct');
  step.words.forEach(w=>{const sp=mk('span','aw');sp.textContent=w;aa.appendChild(sp);});
  document.getElementById(`ck${qi}`).disabled=true;
  document.getElementById(`sp${qi}`).disabled=false;
  document.getElementById(`wb${qi}`)?.querySelectorAll('.wchip').forEach(c=>{if(step.words.includes(c.dataset.w))c.classList.add('used');});
  setFb(qi,'✅ Верно! Теперь произнеси вслух!','good');
}

// Complete card — only shown after LAST question spoken
function tryShowDone(){
  const allQ=Qs();
  const allSpoke=allQ.every((_,i)=>qSt[i]?.spoke);
  if(!allSpoke) return;
  const scr=document.getElementById('sit-scroll');
  if(scr.querySelector('.done-card')) return;
  const dc=mk('div','done-card');
  dc.innerHTML=`<div class="done-stars">★ ★ ★</div><h3>Ситуация завершена!</h3><p>Ты прошёл все вопросы и произнёс каждую фразу вслух. Отличная работа!</p><button class="home-btn" onclick="goHome()">← На главную</button>`;
  scr.appendChild(dc);
  setTimeout(()=>dc.classList.add('show'),30);
  setTimeout(()=>scr.scrollTop=scr.scrollHeight,120);
  tts('Excellent! You finished! Well done!',0.9);
}

function renderReply(scr,step){
  const bbl=mk('div','dbbl');
  const role=mk('div','brole mgr'); role.textContent=step.spk;
  bbl.appendChild(role);
  const body=mk('div','bbody mgr');
  const txt=mk('div','mgtxt');
  step.ws.forEach((w,i)=>{
    if(i>0)txt.appendChild(document.createTextNode(' '));
    const sp=mk('span','mw');
    sp.innerHTML=w.en;
    if(w.tr||w.ru){
      const tip=mk('div','mw-tip');
      if(w.tr){const t=mk('span','tt-t');t.textContent=`[${w.tr}]`;tip.appendChild(t);}
      if(w.ru){const r=mk('span','tt-r');r.textContent=w.ru;tip.appendChild(r);}
      sp.appendChild(tip);
    }
    txt.appendChild(sp);
  });
  body.appendChild(txt);
  const fullText=step.ws.map(w=>w.en).join(' ');
  const listenRow=mk('div','reply-listen-row');
  const listenBtn=mk('button','reply-listen-btn');
  listenBtn.innerHTML='🔊 Послушать';
  listenBtn.onclick=()=>playReply(fullText,listenBtn);
  listenRow.appendChild(listenBtn);
  body.appendChild(listenRow);
  bbl.appendChild(body); scr.appendChild(bbl);
}

function playReply(text,btn){
  if(!window.speechSynthesis)return;
  if(btn.classList.contains('playing')){speechSynthesis.cancel();btn.classList.remove('playing');btn.innerHTML='🔊 Послушать';return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.88; u.pitch=1.0;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('en')&&(v.name.includes('Google')||v.name.includes('Samantha')||v.name.includes('Daniel')));
  if(v)u.voice=v;
  btn.classList.add('playing'); btn.innerHTML='⏹ Стоп';
  u.onend=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 Послушать';};
  u.onerror=()=>{btn.classList.remove('playing');btn.innerHTML='🔊 Послушать';};
  speechSynthesis.speak(u);
}

// ════════════════════════════════════════
//  MICROPHONE — once per session
// ════════════════════════════════════════
let micStream=null;

async function initMic(){
  if(micStream!==null)return micStream!==false;
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    document.getElementById('mic-banner').style.display='none';
    return true;
  }catch(e){
    micStream=false; return false;
  }
}

window.micBannerAllow=async function(){
  const ok=await initMic();
  if(!ok) document.getElementById('mic-banner').style.display='none';
};

function doSpeak(qi){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setSS(qi,'⚠️ Только Chrome поддерживает распознавание речи','err');return;}
  if(micStream===false){
    setSS(qi,'🚫 Нет доступа к микрофону. Нажми 🔒 в адресной строке.','err');
    document.getElementById('mic-banner').style.display='flex';
    return;
  }
  if(micStream===null){
    initMic().then(ok=>{
      if(ok)startRec(qi);
      else{setSS(qi,'🚫 Доступ запрещён.','err');document.getElementById('mic-banner').style.display='flex';}
    });
    return;
  }
  startRec(qi);
}

function startRec(qi){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  stopRec();
  const step=Qs()[qi];
  rec=new SR(); rec.lang='en-US'; rec.interimResults=false; rec.maxAlternatives=3;
  recActive=true;
  setSS(qi,'🎙️ Слушаю… Говори!','go');
  const btn=document.getElementById(`sp${qi}`); btn.textContent='⏹ Стоп';
  rec.onresult=(e)=>{
    const alts=Array.from(e.results[0]).map(r=>r.transcript.trim());
    const tgt=norm(step.ans);
    let ok=alts.some(a=>norm(a)===tgt);
    if(!ok){
      const tw=tgt.split(' ');
      ok=alts.some(a=>{const uw=norm(a).split(' ');return uw.filter(w=>tw.includes(w)).length/tw.length>=0.75;});
    }
    if(ok){
      setSS(qi,'✅ Отлично произнесено!','ok');
      setFb(qi,'🎉 Браво! И составил, и произнёс правильно!','good');
      tts(pick(['Amazing!','Brilliant!','Perfect!','You nailed it!']),0.95);
      qSt[qi].spoke=true;
      setTimeout(tryShowDone, 600);
    } else {
      setSS(qi,`❌ Слышу: "${alts[0]}" — попробуй ещё раз!`,'err');
    }
    btn.textContent='🎤 Говорю!'; recActive=false;
  };
  rec.onerror=(e)=>{
    const msg=e.error==='not-allowed'?'⚠️ Нет доступа к микрофону.':e.error==='no-speech'?'🔇 Не слышу. Говори громче!':'⚠️ Ошибка: '+e.error;
    setSS(qi,msg,'err'); btn.textContent='🎤 Говорю!'; recActive=false;
  };
  rec.onend=()=>{btn.textContent='🎤 Говорю!'; recActive=false;};
  rec.start();
}

function stopRec(){if(rec){try{rec.stop();}catch(e){}rec=null;}recActive=false;}
function norm(s){return s.toLowerCase().replace(/[,.!?'"]/g,'').trim();}

function tts(txt,rate=1){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=rate;u.pitch=1.05;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('en')&&(v.name.includes('Google')||v.name.includes('Samantha')));
  if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

let vocabCollapsed=false;
window.toggleVocab=function(){
  vocabCollapsed=!vocabCollapsed;
  const w=document.getElementById('vocab-widget');

// Drag vocab
(function(){
  const w=()=>document.getElementById('vocab-widget');
  let dx=0,dy=0,dragging=false;
  function start(cx,cy){
    dragging=true;
    const r=w().getBoundingClientRect();
    dx=cx-r.left; dy=cy-r.top;
    w().style.transition='none';
  }
  function move(cx,cy){
    if(!dragging)return;
    const el=w();
    const x=Math.min(Math.max(cx-dx,0),window.innerWidth-el.offsetWidth);
    const y=Math.min(Math.max(cy-dy,0),window.innerHeight-el.offsetHeight);
    el.style.left=x+'px'; el.style.top=y+'px';
  }
  function end(){dragging=false;}
  document.getElementById('vocab-head').addEventListener('mousedown',e=>{start(e.clientX,e.clientY);e.preventDefault();});
  document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup',end);
  document.getElementById('vocab-head').addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  document.addEventListener('touchmove',e=>{if(!dragging)return;const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  document.addEventListener('touchend',end);
})();

window.toggleNotesPanel=function(){
  panelOpen=!panelOpen;
  document.getElementById('notes-panel').classList.toggle('open',panelOpen);
  if(panelOpen)setTimeout(()=>document.getElementById('notes-input').focus(),80);

document.addEventListener('keydown',(e)=>{
  const tag=document.activeElement?.tagName;
  const isInput=(tag==='INPUT'||tag==='TEXTAREA');
  if(e.key==='n'||e.key==='N'){
    if(isInput)return; // don't trigger when typing anywhere
    e.preventDefault(); toggleNotesPanel();
  }
  if(e.key==='Escape'&&panelOpen){
    panelOpen=false;
    document.getElementById('notes-panel').classList.remove('open');
  }
});

window.selColor=function(dot){
  document.querySelectorAll('.nc-dot').forEach(d=>d.classList.remove('sel'));
  dot.classList.add('sel'); noteColor=dot.dataset.c;
};

window.noteKeydown=function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addNote();}
};

window.addNote=function(){
  const ta=document.getElementById('notes-input');
  const txt=ta.value.trim(); if(!txt){ta.focus();return;}
  const id='note-'+(++noteCount);
  const vw=window.innerWidth,vh=window.innerHeight;
  const x=Math.min(Math.max(vw/2-100+(Math.random()-.5)*160,20),vw-300);
  const y=Math.min(Math.max(vh/2-60+(Math.random()-.5)*120,60),vh-200);
  const data={id,color:noteColor,text:txt,x,y,sitId:curSitId};
  if(!stickerStore[curSitId])stickerStore[curSitId]=[];
  stickerStore[curSitId].push(data);
  spawnSticker(data);
  ta.value=''; ta.focus();
};

function spawnSticker(data){
  const note=document.createElement('div');
  note.className='sticky'; note.id=data.id;
  note.style.cssText=`background:${data.color};left:${data.x}px;top:${data.y}px;`;
  note.innerHTML=`
    <div class="sticky-bar">
      <span class="sticky-drag-hint">⠿ тащи</span>
      <button class="sticky-del" onclick="delNote('${data.id}')" title="Удалить">✕</button>
    </div>
    <div class="sticky-body" contenteditable="true" spellcheck="false">${escHtml(data.text)}</div>
    <div class="sticky-edit-hint">✏️ кликни чтобы редактировать</div>`;
  document.body.appendChild(note);
  makeDraggableNote(note, data);
}

function makeDraggableNote(el,data){
  let ox=0,oy=0,dragging=false;
  function start(cx,cy){
    dragging=true; ox=cx-el.getBoundingClientRect().left; oy=cy-el.getBoundingClientRect().top;
    el.style.transition='none'; el.style.zIndex=9500;
  }
  function move(cx,cy){
    if(!dragging)return;
    const x=Math.min(Math.max(cx-ox,0),window.innerWidth-el.offsetWidth);
    const y=Math.min(Math.max(cy-oy,0),window.innerHeight-el.offsetHeight);
    el.style.left=x+'px'; el.style.top=y+'px';
    data.x=x; data.y=y;
  }
  function end(){dragging=false; el.style.zIndex=8900;}
  el.addEventListener('mousedown',e=>{if(e.target.classList.contains('sticky-body')||e.target.classList.contains('sticky-del'))return;start(e.clientX,e.clientY);e.preventDefault();});
  document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup',end);
  el.addEventListener('touchstart',e=>{if(e.target.classList.contains('sticky-body')||e.target.classList.contains('sticky-del'))return;const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  el.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  el.addEventListener('touchend',end);
}

window.delNote=function(id){
  const n=document.getElementById(id); if(!n)return;
  n.style.opacity='0'; n.style.transform='scale(.7)'; n.style.transition='opacity .18s,transform .18s';
  setTimeout(()=>n.remove(),180);
  // remove from store
  if(curSitId&&stickerStore[curSitId])
    stickerStore[curSitId]=stickerStore[curSitId].filter(s=>s.id!==id);
};

window.clearSitNotes=function(){
  if(!curSitId)return;
  (stickerStore[curSitId]||[]).forEach(s=>delNote(s.id));
  stickerStore[curSitId]=[];
};

function hideSitStickers(){
  document.querySelectorAll('.sticky').forEach(el=>el.style.display='none');
}

function showSitStickers(sitId){
  // hide all first
  document.querySelectorAll('.sticky').forEach(el=>el.style.display='none');
  // show only this situation's stickers
  (stickerStore[sitId]||[]).forEach(data=>{
    const el=document.getElementById(data.id);
    if(el) el.style.display='block';
    else spawnSticker(data);
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function show(id){document.getElementById(id).classList.add('active');}
function hide(id){document.getElementById(id).classList.remove('active');}
function setFb(qi,msg,t){const e=document.getElementById(`fb${qi}`);if(!e)return;e.textContent=msg;e.className='qfb'+(t?' '+t:'');}
function setSS(qi,msg,c){const e=document.getElementById(`ss${qi}`);if(!e)return;e.textContent=msg;e.className='sst'+(c?' '+c:'');}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

window.addEventListener('load',()=>{
  buildHome();
  buildVocab();
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged',()=>speechSynthesis.getVoices());
});
